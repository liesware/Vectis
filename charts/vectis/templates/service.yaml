{{- include "vectis.validate" . -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vectis.fullname" . }}
  labels:
    {{- include "vectis.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "vectis.selectorLabels" . | nindent 4 }}
